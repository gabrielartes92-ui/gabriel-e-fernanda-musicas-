<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fe & Gabi Music</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        :root {
            --primary: #ff758c;
            --secondary: #ff7eb3;
            --dark: #2d3436;
            --light: #fdfdfd;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: rgba(31, 38, 135, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            padding: 15px;
            color: var(--dark);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px var(--glass-shadow);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .art-container { display: flex; justify-content: center; align-items: center; margin-top: 10px; }
        .vinyl-record {
            width: 140px; height: 140px;
            background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 0 0 8px #000;
            display: flex; justify-content: center; align-items: center;
            animation: spin 8s linear infinite; animation-play-state: paused;
        }
        .vinyl-record.playing { animation-play-state: running; }
        .vinyl-label {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%; position: relative;
        }
        .vinyl-label::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 10px; height: 10px;
            background: #fff; border-radius: 50%;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .song-info { text-align: center; }
        .song-title { font-size: 18px; font-weight: 600; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .song-artist { font-size: 13px; color: rgba(255,255,255,0.8); }

        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .btn-control {
            background: rgba(255, 255, 255, 0.2); border: none; color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-control:active { background: rgba(255, 255, 255, 0.4); transform: scale(0.95); }
        .btn-play {
            width: 65px; height: 65px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
        }
        .btn-play:active { transform: scale(0.95); }
        .btn-control svg { width: 24px; height: 24px; fill: currentColor; }
        .btn-play svg { width: 30px; height: 30px; }

        .progress-container { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .progress-bar-bg { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.3); border-radius: 10px; position: relative; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #fff; width: 0%; border-radius: 10px; transition: width 0.1s linear; }
        .time-info { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.9); font-weight: 500; }

        .upload-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed rgba(255, 255, 255, 0.5);
            border-radius: 15px; padding: 15px; text-align: center; color: white;
            position: relative; overflow: hidden;
        }
        .upload-area:active { background: rgba(255, 255, 255, 0.3); }
        .upload-area input { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }
        .upload-area p { font-size: 14px; font-weight: 500; margin-top: 5px; }

        .playlist {
            background: rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 10px;
            max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
        }
        .playlist-item {
            background: rgba(255, 255, 255, 0.4); padding: 12px 15px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; color: var(--dark); font-size: 14px;
        }
        .playlist-item.active { background: #fff; border-left: 4px solid var(--primary); font-weight: 600; }
        .item-info { display: flex; align-items: center; gap: 10px; overflow: hidden; cursor: pointer; flex-grow: 1; }
        .item-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .btn-delete {
            background: rgba(255, 0, 0, 0.1); border: none; color: #e74c3c;
            width: 35px; height: 35px; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 350px; }
        .toast {
            background: white; padding: 12px 20px; border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); font-size: 14px; text-align: center;
            opacity: 0; transform: translateY(-20px); transition: 0.3s;
            border-bottom: 4px solid var(--primary);
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="app-container">
        <div class="art-container">
            <div class="vinyl-record" id="vinyl"><div class="vinyl-label"></div></div>
        </div>

        <div class="song-info">
            <div class="song-title" id="song-title">Selecione uma música</div>
            <div class="song-artist">Fernanda & Gabriel</div>
        </div>

        <div class="progress-container">
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="total-time">0:00</span>
            </div>
            <div class="progress-bar-bg" id="progress-container">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-control" onclick="window.prevSong()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn-control btn-play" onclick="window.togglePlay()" id="play-btn">
                <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn-control" onclick="window.nextSong()"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
        </div>

        <div class="upload-area">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p>Toque aqui para adicionar Músicas</p>
            <input type="file" id="file-input" accept=".mp3,audio/mpeg,audio/wav,audio/ogg,audio/m4a" multiple>
        </div>

        <div class="playlist" id="playlist">
            <div style="text-align:center; padding:10px; color:#fff; font-size:13px;">Carregando músicas da nuvem...</div>
        </div>
    </div>

    <!-- O SCRIPT AGORA É DO TIPO MODULE PARA IMPORTAR O FIREBASE -->
    <script type="module">
        // Importando as ferramentas do Firebase direto da nuvem
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        // =========================================================================
        // SUAS CHAVES DO PROJETO "GF MUSICAS" ESTÃO AQUI:
        // =========================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD-aBcDeFgHiJkLmNoPqRsTuVwXyZ12345",
            authDomain: "gf-musicas.firebaseapp.com",
            projectId: "gf-musicas",
            storageBucket: "gf-musicas.firebasestorage.app",
            messagingSenderId: "936486375596",
            appId: "1:936486375596:web:48a7b9c10d11e12f"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        let songs = []; 
        let currentSongIndex = -1; 
        let audio = new Audio();

        // Escuta o banco de dados em TEMPO REAL (Se a Gabi adicionar, atualiza pro Fe na hora)
        onSnapshot(collection(db, "musicas"), (snapshot) => {
            songs = [];
            snapshot.forEach((doc) => {
                songs.push({ id: doc.id, ...doc.data() });
            });
            renderPlaylist();
            if(songs.length > 0 && currentSongIndex === -1) loadSongInfo(0);
        });

        // Fazer Upload da música para a nuvem
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files).filter(f => f.type.includes('audio') || f.name.match(/\.(mp3|wav|ogg|m4a)$/i));
            if (files.length === 0) return;
            
            showToast("Enviando para a nuvem... Aguarde.");
            
            for (let file of files) {
                const fileName = file.name.replace(/\.[^/.]+$/, "");
                const storagePath = `musicas/${Date.now()}_${file.name}`;
                const storageRef = ref(storage, storagePath);
                
                try {
                    // Sobe o arquivo pro Storage
                    const snapshot = await uploadBytesResumable(storageRef, file);
                    // Pega o link público da música
                    const downloadURL = await getDownloadURL(snapshot.ref);
                    
                    // Salva o link e o nome no Banco de Dados
                    await addDoc(collection(db, "musicas"), {
                        name: fileName,
                        url: downloadURL,
                        path: storagePath
                    });
                } catch (error) {
                    console.error("Erro no upload:", error);
                    showToast("Erro ao enviar: " + fileName);
                }
            }
            showToast(`${files.length} música(s) adicionada(s)!`);
            e.target.value = ''; // Limpa o input
        });

        // Deletar da nuvem
        window.deleteSongFromDB = async function(id, path, event) {
            event.stopPropagation();
            if(confirm("Tem certeza que quer apagar essa música para todos?")) {
                showToast("Apagando da nuvem...");
                try {
                    // Apaga do banco de dados
                    await deleteDoc(doc(db, "musicas", id));
                    // Apaga o arquivo físico do Storage
                    const fileRef = ref(storage, path);
                    await deleteObject(fileRef);
                    showToast("Música removida!");
                    
                    if (songs.length === 1) { // Era a última música
                        audio.pause(); 
                        document.getElementById('song-title').innerText = "Selecione uma música"; 
                        updatePlayButton(false);
                        currentSongIndex = -1;
                    }
                } catch(error) {
                    console.error(error);
                    showToast("Erro ao apagar música.");
                }
            }
        }

        function renderPlaylist() {
            const playlistEl = document.getElementById('playlist'); playlistEl.innerHTML = '';
            if (songs.length === 0) { playlistEl.innerHTML = '<div style="text-align:center; padding:10px; color:#fff; font-size:13px;">Nenhuma música na nuvem. Toque no botão acima!</div>'; return; }
            
            songs.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentSongIndex ? 'active' : ''}`;
                // Passa o ID do banco e o Path do storage para poder deletar
                item.innerHTML = `
                    <div class="item-info" onclick="window.playSong(${index})">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="5" cy="19" r="1"></circle><circle cx="19" cy="19" r="1"></circle></svg>
                        <span class="item-name">${song.name}</span>
                    </div>
                    <button class="btn-delete" onclick="window.deleteSongFromDB('${song.id}', '${song.path}', event)" title="Remover">✕</button>
                `;
                playlistEl.appendChild(item);
            });
        }

        window.loadSongInfo = function(index) {
            currentSongIndex = index;
            document.getElementById('song-title').innerText = songs[index].name;
            audio.src = songs[index].url; // Agora toca direto do link da nuvem!
            renderPlaylist();
        }

        window.playSong = function(index) { 
            window.loadSongInfo(index); 
            audio.play(); 
            updatePlayButton(true); 
        }

        window.togglePlay = function() {
            if (songs.length === 0) return showToast("A nuvem está vazia!");
            if (currentSongIndex === -1) window.loadSongInfo(0);
            if (audio.paused) { audio.play(); updatePlayButton(true); } else { audio.pause(); updatePlayButton(false); }
        }

        window.nextSong = function() { if (songs.length === 0) return; window.playSong((currentSongIndex + 1) % songs.length); }
        window.prevSong = function() { if (songs.length === 0) return; window.playSong((currentSongIndex - 1 + songs.length) % songs.length); }

        audio.addEventListener('timeupdate', () => {
            if (isNaN(audio.duration)) return;
            document.getElementById('progress-fill').style.width = `${(audio.currentTime / audio.duration) * 100}%`;
            document.getElementById('current-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-time').innerText = formatTime(audio.duration);
        });
        audio.addEventListener('ended', window.nextSong);

        document.getElementById('progress-container').addEventListener('click', function(e) {
            if (audio.duration) audio.currentTime = (e.offsetX / this.clientWidth) * audio.duration;
        });

        function formatTime(s) { const min = Math.floor(s/60); const sec = Math.floor(s%60); return `${min}:${sec<10?'0':''}${sec}`; }
        
        function updatePlayButton(isPlaying) {
            document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block';
            document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
            isPlaying ? document.getElementById('vinyl').classList.add('playing') : document.getElementById('vinyl').classList.remove('playing');
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div'); toast.className = 'toast'; toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel e Fernanda - Músicas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px 20px;
        }
        
        .upload-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 2px dashed #667eea;
            text-align: center;
        }
        
        .upload-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .file-input-wrapper input[type="file"] {
            display: none;
        }
        
        .file-input-label {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .file-input-label:hover {
            transform: scale(1.05);
        }
        
        .upload-hint {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        .upload-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        
        .upload-status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .upload-status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .playlist-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        
        .musica {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 20px 0;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        
        .musica:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
        }
        
        .musica h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        
        .musica audio {
            width: 100%;
            margin-top: 10px;
            height: 40px;
            border-radius: 5px;
        }
        
        .delete-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.2s;
        }
        
        .delete-btn:hover {
            background: #c82333;
        }
        
        .empty-message {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1.1em;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Gabriel e Fernanda</h1>
            <p>Nossas Músicas Especiais</p>
        </div>
        
        <div class="content">
            <!-- Seção de Upload -->
            <div class="upload-section">
                <h2>📤 Importar Música</h2>
                <div class="file-input-wrapper">
                    <input 
                        type="file" 
                        id="musicInput" 
                        accept=".mp3,.wav,.ogg,.m4a"
                        multiple
                    >
                    <label for="musicInput" class="file-input-label">
                        ➕ Selecionar Arquivos de Áudio
                    </label>
                </div>
                <div class="upload-hint">
                    Clique para selecionar arquivos MP3, WAV, OGG ou M4A<br>
                    Os arquivos serão salvos automaticamente
                </div>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Salvando música na nuvem...</p>
                </div>
                <div class="upload-status" id="uploadStatus"></div>
            </div>
            
            <!-- Seção de Playlist -->
            <div class="playlist-section">
                <h2>🎧 Playlist</h2>
                <div id="playlistContainer">
                    <div class="empty-message">
                        Nenhuma música importada ainda. Clique em "Importar Música" para começar! 🎶
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simular armazenamento em nuvem usando localStorage
        // Em produção, isso seria conectado a um servidor real
        
        const musicInput = document.getElementById('musicInput');
        const playlistContainer = document.getElementById('playlistContainer');
        const uploadStatus = document.getElementById('uploadStatus');
        const loading = document.getElementById('loading');
        
        // Carregar músicas ao iniciar
        loadPlaylist();
        
        musicInput.addEventListener('change', handleFileUpload);
        
        function handleFileUpload(e) {
            const files = Array.from(e.target.files);
            
            if (files.length === 0) return;
            
            loading.style.display = 'block';
            uploadStatus.style.display = 'none';
            
            // Simular delay de upload
            setTimeout(() => {
                files.forEach(file => {
                    saveMusic(file);
                });
                
                loading.style.display = 'none';
                showStatus(`✅ ${files.length} música(s) salva(s) com sucesso na nuvem!`, 'success');
                
                // Limpar input
                musicInput.value = '';
                
                // Recarregar playlist
                loadPlaylist();
            }, 1500);
        }
        
        function saveMusic(file) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const music = {
                    id: Date.now(),
                    name: file.name,
                    data: e.target.result,
                    type: file.type,
                    size: file.size
                };
                
                let playlist = JSON.parse(localStorage.getItem('musicPlaylist')) || [];
                playlist.push(music);
                localStorage.setItem('musicPlaylist', JSON.stringify(playlist));
            };
            
            reader.readAsDataURL(file);
        }
        
        function loadPlaylist() {
            const playlist = JSON.parse(localStorage.getItem('musicPlaylist')) || [];
            
            if (playlist.length === 0) {
                playlistContainer.innerHTML = `
                    <div class="empty-message">
                        Nenhuma música importada ainda. Clique em "Importar Música" para começar! 🎶
                    </div>
                `;
                return;
            }
            
            playlistContainer.innerHTML = '';
            
            playlist.forEach((music, index) => {
                const musicDiv = document.createElement('div');
                musicDiv.className = 'musica';
                
                const fileName = music.name.substring(0, 50) + 
                    (music.name.length > 50 ? '...' : '');
                
                const fileSize = (music.size / 1024 / 1024).toFixed(2);
                
                musicDiv.innerHTML = `
                    <h3>🎵 ${fileName}</h3>
                    <small style="color: #666;">Tamanho: ${fileSize} MB</small>
                    <audio controls>
                        <source src="${music.data}" type="${music.type}">
                        Seu navegador não suporta reprodução de áudio.
                    </audio>
                    <button class="delete-btn" onclick="deleteMusic(${music.id})">
                        🗑️ Remover
                    </button>
                `;
                
                playlistContainer.appendChild(musicDiv);
            });
        }
        
        function deleteMusic(id) {
            if (confirm('Tem certeza que deseja remover esta música?')) {
                let playlist = JSON.parse(localStorage.getItem('musicPlaylist')) || [];
                playlist = playlist.filter(m => m.id !== id);
                localStorage.setItem('musicPlaylist', JSON.stringify(playlist));
                
                showStatus('✅ Música removida com sucesso!', 'success');
                loadPlaylist();
            }
        }
        
        function showStatus(message, type) {
            uploadStatus.textContent = message;
            uploadStatus.className = `upload-status ${type}`;
            uploadStatus.style.display = 'block';
            
            setTimeout(() => {
                uploadStatus.style.display = 'none';
            }, 4000);
        }
    </script>
</body>
</html>
